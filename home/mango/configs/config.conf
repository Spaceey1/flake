bind=Super,H,focusstack,prev
bind=Super,L,focusstack,next
bind=Super+Shift,H,exchange_stack_client,prev
bind=Super+Shift,L,exchange_stack_client,next
bind=Super+Shift,J,tagtoright
bind=Super+Shift,K,tagtoleft
bind=Super,J,viewtoright,d
bind=Super,K,viewtoleft,u
bind=Super,B,togglefloating
bind=Super+Ctrl+Shift,bracketleft,spawn,hyprlock

bind=Alt,F,togglefullscreen
scroller_proportion_preset=0.5,1
bind=Super,F,switch_proportion_preset,0.5,1
scroller_default_proportion=0.5
edge_scroller_pointer_focus=0

axisbind=Super,Up,focusstack,prev
axisbind=Super,Down,focusstack,next
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

bind=Super,Return,spawn,kitty
bind=Super+Shift,Q,killclient
bind=Super,e,spawn,librewolf
bind=Super+Shift,R,reload_config
bind=Alt+Shift,S,spawn,~/usrbin/wayscreenshot
bind=Super+Shift,E,spawn,wleave
focus_on_activate=0

bind=Super,W,setlayout,tile
bind=Super,Q,setlayout,scroller

enable_hotarea=0
ov_tab_mode=1
bind=Super,Tab,toggleoverview



sloppyfocus=1

monitorrule=name:HDMI-A-2,width:1920,height:1080,refresh:120,x:1920
monitorrule=name:HDMI-A-1,width:1920,height:1080,refresh:60 ,x:0
